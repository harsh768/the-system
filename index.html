<html lang="en">
<head>

<meta name="theme-color" content="#08090e" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'none'; object-src 'none'" />
<meta name="referrer" content="no-referrer" />

<meta name="apple-mobile-web-app-capable" content="yes" />

<title>The System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070a12; --surface:rgba(120,170,255,0.055); --surface2:rgba(120,170,255,0.09);
  --line:rgba(120,170,255,0.16); --line2:rgba(111,176,255,0.42);
  --accent:#6fb0ff; --accent2:#b489ff; --accent-d:#3f7fe0;
  --gold:#ffce6b; --green:#5cf0b0; --red:#ff8fa0; --orange:#ffbb7e; --teal:#5fe0ec;
  --txt:#eef4ff; --txt2:#bcc8e6; --muted:#7e8aac;
  --glow:0 0 0 1px rgba(111,176,255,.3), 0 0 24px rgba(63,127,224,.35);
  --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:'Sora',-apple-system,system-ui,sans-serif;overscroll-behavior-y:contain;font-size:15px;}
body{min-height:100vh;line-height:1.45;background:
  repeating-linear-gradient(0deg, rgba(120,170,255,.018) 0 1px, transparent 1px 3px),
  radial-gradient(1100px 600px at 50% -12%, rgba(111,176,255,.24), transparent 60%),
  radial-gradient(820px 520px at 94% 110%, rgba(180,137,255,.16), transparent 60%),
  radial-gradient(700px 700px at 4% 40%, rgba(95,224,236,.07), transparent 60%),var(--bg);background-attachment:fixed;}
h1,h2,h3{font-family:'Space Grotesk',sans-serif;letter-spacing:.2px;}
.hidden{display:none !important;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
::-webkit-scrollbar{width:0;height:0;}
.num{font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums;}
#app{max-width:520px;margin:0 auto;padding:calc(var(--safe-top) + 14px) 16px calc(94px + var(--safe-bot)) 16px;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand .mark{width:26px;height:26px;border-radius:7px;filter:drop-shadow(0 0 5px rgba(148,166,255,.5));}
.brand b{font-family:'Space Grotesk';font-size:14px;letter-spacing:4px;font-weight:700;background:linear-gradient(100deg,var(--accent),var(--accent2),var(--gold));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.icon-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;font-size:17px;color:var(--txt2);}
.panel{position:relative;background:linear-gradient(180deg,rgba(111,176,255,.05),transparent 34%),var(--surface);border:1px solid var(--line);border-radius:15px;padding:17px;margin-bottom:14px;backdrop-filter:blur(9px);box-shadow:0 6px 22px rgba(0,0,0,.25),0 0 18px rgba(63,127,224,.05);}
.panel::before,.panel::after{content:"";position:absolute;width:12px;height:12px;border:2px solid var(--accent);opacity:.5;pointer-events:none;}
.panel::before{top:-1px;left:-1px;border-right:none;border-bottom:none;border-radius:5px 0 0 0;}
.panel::after{right:-1px;bottom:-1px;border-left:none;border-top:none;border-radius:0 0 5px 0;}
.panel-title{font-family:'Space Grotesk';font-size:11px;letter-spacing:2.5px;color:var(--accent);text-transform:uppercase;margin:0 0 13px;font-weight:600;display:flex;align-items:center;gap:8px;text-shadow:0 0 12px rgba(111,176,255,.45);}
.panel-title .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);}
.hero{background:linear-gradient(150deg, rgba(148,166,255,.10), rgba(193,168,255,.05) 60%, transparent);border-color:var(--line2);}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.rankbadge{flex:none;text-align:center;}
.rankbadge .r{font-family:'Space Grotesk';font-weight:700;font-size:26px;line-height:1;width:54px;height:54px;border-radius:15px;display:grid;place-items:center;border:1px solid var(--line2);color:#fff;background:linear-gradient(160deg, rgba(148,166,255,.28), rgba(193,168,255,.12));box-shadow:var(--glow);}
.rankbadge small{font-size:9px;letter-spacing:2px;color:var(--muted);display:block;margin-top:5px;}
.hero-name{font-family:'Space Grotesk';font-size:19px;color:#fff;margin:0;font-weight:600;}
.hero-title{font-size:13px;color:var(--accent);font-weight:500;margin-top:1px;}
.hero-level{font-size:12px;color:var(--muted);margin-top:5px;}
.lvlnum{color:var(--gold);font-weight:600;font-family:'Space Grotesk';}
.xpwrap{margin-top:15px;}
.barlabel{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;}
.bar{height:8px;border-radius:6px;background:rgba(0,0,0,.28);overflow:hidden;position:relative;}
.bar>i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent-d),var(--accent) 70%,var(--accent2));box-shadow:0 0 10px rgba(157,177,255,.5);transition:width .5s cubic-bezier(.2,.8,.2,1);}
.badges{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.badge{text-align:center;padding:10px 4px;border-radius:13px;border:1px solid var(--line);background:rgba(0,0,0,.18);opacity:.4;filter:grayscale(.8);}
.badge.on{opacity:1;filter:none;border-color:var(--line2);background:linear-gradient(160deg,rgba(157,177,255,.14),rgba(203,178,255,.06));box-shadow:var(--glow);}
.badge .bi{font-size:22px;line-height:1.1;} .badge .bn{font-size:8.5px;color:var(--muted);letter-spacing:.3px;margin-top:3px;line-height:1.2;}
.badge.on .bn{color:var(--txt2);}
.chal{background:linear-gradient(150deg,rgba(255,206,107,.12),transparent 70%);border-color:rgba(255,206,107,.28);}
@keyframes pulse{0%,100%{box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 0 0 rgba(157,177,255,.0)}50%{box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 50px 6px rgba(157,177,255,.35)}}
.sys.celebrate{animation:pop .28s cubic-bezier(.2,1.1,.4,1), pulse 1.6s ease-in-out infinite;border-color:var(--accent);}
.quest.done .qcheck{animation:checkpop .32s cubic-bezier(.2,1.5,.4,1);}
@keyframes checkpop{0%{transform:scale(.6)}55%{transform:scale(1.22)}100%{transform:scale(1)}}
.bar>i{position:relative;overflow:hidden}
.bar>i::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent 20%,rgba(255,255,255,.45) 50%,transparent 80%);transform:translateX(-120%);animation:shimmer 2.6s ease-in-out infinite;}
@keyframes shimmer{0%{transform:translateX(-120%)}60%,100%{transform:translateX(120%)}}
.confp{position:fixed;top:-14px;width:9px;height:14px;border-radius:2px;z-index:200;pointer-events:none;animation:fall 1.5s ease-in forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(560deg);opacity:.15}}
.hero-stats{display:flex;gap:9px;margin-top:15px;}
.chip{flex:1;text-align:center;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:13px;padding:10px 4px;}
.chip b{display:block;font-family:'Space Grotesk';font-size:18px;font-weight:600;}
.chip span{font-size:9.5px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;}
.chip.gold b{color:var(--gold);} .chip.streak b{color:var(--orange);} .chip.done b{color:var(--green);}
.q-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.q-progress{font-size:11px;color:var(--muted);letter-spacing:.5px;}
.greet{font-size:12.5px;color:var(--accent2);margin:6px 0 10px;line-height:1.4;}
.quest{display:flex;align-items:flex-start;gap:13px;padding:13px 2px;border-top:1px solid var(--line);}
.quest:first-of-type{border-top:none;}
.qcheck{flex:none;width:25px;height:25px;border-radius:8px;border:1.5px solid var(--line2);background:rgba(0,0,0,.2);display:grid;place-items:center;font-size:14px;color:transparent;transition:.18s;margin-top:1px;}
.quest.done .qcheck{background:linear-gradient(150deg,var(--accent),var(--accent2));border-color:transparent;color:#0a0b10;box-shadow:0 4px 14px rgba(148,166,255,.35);}
.qbody{flex:1;min-width:0;}
.qtitle{font-size:15px;font-weight:500;line-height:1.3;}
.quest.done .qtitle{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(136,143,166,.5);}
.qsub{font-size:12px;color:var(--txt2);margin-top:3px;line-height:1.4;}
.qtags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center;}
.tag{font-size:9.5px;letter-spacing:.8px;padding:3px 8px;border-radius:20px;border:1px solid var(--line);color:var(--muted);font-weight:500;}
.tag.xp{color:var(--accent);border-color:var(--line2);}
.tag.gold{color:var(--gold);border-color:rgba(236,199,126,.3);}
.tag.streak{color:var(--orange);border-color:rgba(255,178,122,.4);background:rgba(255,178,122,.08);}
.tag.run{color:#0a0b10;background:linear-gradient(150deg,var(--orange),var(--gold));border-color:transparent;font-weight:700;letter-spacing:.3px;}
.tag.key{color:var(--gold);border-color:rgba(236,199,126,.4);background:rgba(236,199,126,.07);}
.wstat{display:flex;gap:8px;margin:4px 0 13px;} .wstat .wc{flex:1;text-align:center;background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:12px;padding:9px 4px;} .wstat .wc b{display:block;font-family:'Space Grotesk';font-size:16px;} .wstat .wc span{font-size:8.5px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;}
.wstat .wc.now{border-color:var(--line2);background:linear-gradient(160deg,rgba(111,176,255,.12),rgba(0,0,0,.2));}
.wgoal{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin:0 0 5px;letter-spacing:.3px;}
.up{color:var(--red);} .down{color:var(--green);} .flat{color:var(--muted);}
.statrow{margin-bottom:15px;}
.statrow .barlabel b{color:var(--txt);font-family:'Space Grotesk';font-size:12px;font-weight:600;}
.statrow .barlabel .v{color:var(--accent);font-family:'Space Grotesk';}
.stat-desc{font-size:10.5px;color:var(--muted);margin-top:4px;}
.bar.str>i{background:linear-gradient(90deg,#e08a5a,var(--orange));}
.bar.vit>i{background:linear-gradient(90deg,#d96a78,var(--red));}
.bar.agi>i{background:linear-gradient(90deg,#4fb89a,var(--green));}
.bar.int>i{background:linear-gradient(90deg,var(--accent-d),var(--accent));}
.bar.per>i{background:linear-gradient(90deg,#7d68d6,var(--accent2));}
.bar.sen>i{background:linear-gradient(90deg,#5bb8b0,var(--teal));}
.bar.wlt>i{background:linear-gradient(90deg,#c9a85e,var(--gold));}
.reward{display:flex;align-items:center;gap:13px;padding:13px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;background:rgba(0,0,0,.16);}
.reward .ic{font-size:22px;width:42px;height:42px;display:grid;place-items:center;border-radius:11px;background:var(--surface2);}
.reward .info{flex:1;min-width:0;} .reward .rn{font-size:14.5px;font-weight:500;} .reward .rc{font-size:12px;color:var(--gold);font-family:'Space Grotesk';margin-top:2px;}
.redeem{padding:9px 14px;border-radius:11px;font-size:11px;letter-spacing:.5px;font-weight:600;border:1px solid var(--line2);color:var(--accent);background:rgba(148,166,255,.08);}
.redeem:disabled{opacity:.35;border-color:var(--line);color:var(--muted);background:none;}
.reward .del{color:var(--red);font-size:16px;padding:4px;opacity:.7;}
.btn{display:block;width:100%;text-align:center;padding:14px;border-radius:14px;font-family:'Space Grotesk';font-size:13px;letter-spacing:.5px;font-weight:600;border:1px solid transparent;color:#0a0b10;background:linear-gradient(150deg,var(--accent),var(--accent2));box-shadow:0 6px 20px rgba(148,166,255,.25);}
.btn.ghost{background:var(--surface);color:var(--accent);border-color:var(--line2);box-shadow:none;}
.btn.danger{background:rgba(255,143,160,.08);color:var(--red);border-color:rgba(255,143,160,.3);box-shadow:none;}
.btn.sm{padding:11px;font-size:11px;}
.btn:disabled{opacity:.4;}
.money-hero{text-align:center;background:linear-gradient(150deg, rgba(236,199,126,.10), transparent 70%);border-color:rgba(236,199,126,.2);}
.big-num{font-family:'Space Grotesk';font-size:30px;font-weight:700;margin:4px 0;}
.mgrid{display:flex;gap:9px;margin-top:14px;}
.mcard{flex:1;background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:13px;padding:11px 8px;text-align:center;}
.mcard b{display:block;font-family:'Space Grotesk';font-size:15px;} .mcard span{font-size:9.5px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;}
.catrow{margin-bottom:14px;} .catrow .cl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;} .catrow .cl .cv{font-family:'Space Grotesk';color:var(--txt2);font-size:12px;}
.bar.over>i{background:linear-gradient(90deg,#d96a78,var(--red)) !important;}
.fixed-row{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-top:1px solid var(--line);} .fixed-row:first-child{border-top:none;} .fixed-row .amt{font-family:'Space Grotesk';color:var(--txt2);}
.spend-item{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;color:var(--txt2);} .spend-item .sa{font-family:'Space Grotesk';color:var(--red);}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:6px;} .cal .dow{text-align:center;font-size:9px;color:var(--muted);letter-spacing:.5px;}
.cell{aspect-ratio:1;border-radius:9px;border:1px solid var(--line);display:grid;place-items:center;font-size:10px;color:var(--muted);background:rgba(0,0,0,.14);}
.cell.full{background:linear-gradient(150deg,var(--accent),var(--accent2));color:#0a0b10;border-color:transparent;font-weight:600;}
.cell.partial{background:rgba(193,168,255,.16);border-color:var(--line2);color:var(--txt2);} .cell.today{outline:1.5px solid var(--gold);outline-offset:1px;}
.wlog{display:flex;gap:9px;margin-top:10px;}
.input,input,select,textarea{width:100%;padding:12px;border-radius:12px;background:rgba(0,0,0,.25);border:1px solid var(--line);color:var(--txt);font-family:inherit;font-size:15px;outline:none;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
label{font-size:10.5px;color:var(--muted);letter-spacing:1px;display:block;margin:12px 0 5px;text-transform:uppercase;}
.row2{display:flex;gap:10px;} .row2>*{flex:1;}
.legend{display:flex;flex-direction:column;gap:8px;} .leg{display:flex;align-items:center;gap:10px;font-size:13.5px;} .leg .sw{width:11px;height:11px;border-radius:3px;flex:none;} .leg .lk{flex:1;color:var(--txt2);} .leg .lv{color:var(--muted);font-size:12px;}
.til-row{display:flex;gap:11px;padding:9px 0;border-top:1px solid var(--line);} .til-row:first-child{border-top:none;} .til-row .td{flex:none;width:68px;font-size:11px;color:var(--muted);padding-top:1px;} .til-row .tt{flex:1;font-size:13px;color:var(--txt2);line-height:1.45;}
.codex-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:4px;}
.codex-tabs button{flex:none;padding:9px 14px;border-radius:22px;font-size:11px;letter-spacing:.5px;font-weight:600;border:1px solid var(--line);color:var(--muted);background:var(--surface);}
.codex-tabs button.active{color:#0a0b10;background:linear-gradient(150deg,var(--accent),var(--accent2));border-color:transparent;}
.cx h4{font-family:'Space Grotesk';font-size:14px;color:var(--txt);margin:18px 0 8px;font-weight:600;} .cx h4:first-child{margin-top:2px;}
.cx p,.cx li{font-size:13.5px;line-height:1.6;color:var(--txt2);} .cx ul,.cx ol{margin:6px 0;padding-left:19px;} .cx li{margin-bottom:5px;} .cx b{color:var(--txt);font-weight:600;} .cx .hl{color:var(--gold);}
.cx .note{font-size:12px;color:var(--txt2);background:rgba(148,166,255,.06);border:1px solid var(--line2);border-radius:12px;padding:11px 13px;margin:11px 0;}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:center;padding-bottom:var(--safe-bot);background:linear-gradient(180deg,transparent,var(--bg) 40%);}
.nav-inner{display:flex;width:100%;max-width:520px;margin:0 14px 12px;background:rgba(16,18,26,.86);border:1px solid var(--line);border-radius:20px;backdrop-filter:blur(16px);padding:5px;box-shadow:0 8px 30px rgba(0,0,0,.4);}
.nav button{flex:1;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);border-radius:14px;}
.nav button .ni{font-size:17px;line-height:1;} .nav button .nl{font-size:8.5px;letter-spacing:.5px;font-weight:600;}
.nav button.active{color:var(--accent);background:var(--surface);}
.overlay{position:fixed;inset:0;z-index:100;background:rgba(5,6,12,.7);backdrop-filter:blur(6px);display:grid;place-items:center;padding:20px;animation:fade .2s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sys{position:relative;width:100%;max-width:440px;border:1px solid var(--accent);border-radius:12px;
  background:repeating-linear-gradient(0deg, rgba(111,176,255,.035) 0 1px, transparent 1px 4px), linear-gradient(170deg,rgba(16,24,42,.98),rgba(8,12,24,.99));
  box-shadow:0 0 0 1px rgba(111,176,255,.25), 0 0 60px rgba(63,127,224,.4), 0 24px 70px rgba(0,0,0,.65);
  padding:24px;animation:pop .28s cubic-bezier(.2,1.1,.4,1);max-height:90vh;overflow-y:auto;}
.sys::before,.sys::after{content:"";position:absolute;width:18px;height:18px;border:2px solid var(--accent);pointer-events:none;box-shadow:0 0 8px rgba(111,176,255,.5);}
.sys::before{top:-1px;left:-1px;border-right:none;border-bottom:none;border-radius:6px 0 0 0;}
.sys::after{bottom:-1px;right:-1px;border-left:none;border-top:none;border-radius:0 0 6px 0;}
@keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.sys-h{font-family:'Space Grotesk';text-align:center;color:var(--accent);letter-spacing:4px;font-size:11px;font-weight:700;border-bottom:1px solid rgba(111,176,255,.25);padding-bottom:13px;margin-bottom:16px;text-shadow:0 0 14px rgba(111,176,255,.6);}
.sys-big{font-family:'Space Grotesk';font-size:24px;text-align:center;color:#fff;margin:10px 0;font-weight:700;}
.sys p{font-size:14px;line-height:1.6;color:var(--txt2);} .center{text-align:center;}
.notif{position:fixed;left:50%;top:calc(var(--safe-top) + 16px);transform:translateX(-50%);z-index:120;background:rgba(19,21,31,.96);border:1px solid var(--line2);border-radius:14px;padding:11px 18px;box-shadow:0 8px 30px rgba(0,0,0,.4);font-family:'Space Grotesk';font-size:12px;letter-spacing:.5px;color:var(--accent);font-weight:600;animation:drop .35s;max-width:90vw;}
@keyframes drop{from{transform:translate(-50%,-24px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:14px;}
.tiny{font-size:11.5px;color:var(--muted);line-height:1.5;}
.chipsel{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.chipsel button{padding:9px 13px;border-radius:11px;border:1px solid var(--line);font-size:12.5px;color:var(--txt2);background:var(--surface);}
.chipsel button.sel{border-color:var(--accent);color:var(--accent);background:rgba(148,166,255,.1);}
.qedit{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--line);} .qedit:first-child{border-top:none;}
.qedit .qi{flex:1;min-width:0;} .qedit .qi .t{font-size:14px;} .qedit .qi .m{font-size:10.5px;color:var(--muted);margin-top:2px;}

.quest.done .qtitle{animation:none;}

@keyframes qpop{0%{transform:scale(1)}30%{transform:scale(1.015);background:rgba(111,176,255,.06)}100%{transform:scale(1)}}
.loot{position:relative;overflow:hidden;text-align:center;background:linear-gradient(150deg,rgba(255,206,107,.16),rgba(180,137,255,.08) 70%,transparent);border-color:rgba(255,206,107,.4);cursor:pointer;}
.loot::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.28),transparent);animation:sheen 2.6s ease-in-out infinite;pointer-events:none;}
@keyframes sheen{0%{left:-60%}60%,100%{left:120%}}
.loot .chest{font-size:46px;animation:wob 1.8s ease-in-out infinite;filter:drop-shadow(0 4px 12px rgba(255,206,107,.4));}
@keyframes wob{0%,100%{transform:rotate(-5deg) scale(1)}50%{transform:rotate(5deg) scale(1.08)}}

<script>
/* ============================================================
   THE SYSTEM — a general-purpose life RPG (PWA)
   ============================================================ */
const $=(s,el=document)=>el.querySelector(s);
const STORE='thesystem_v1';
const APP_VERSION='1.8';
const ALL=[0,1,2,3,4,5,6];
const DAYNAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function parseD(s){const[a,b,c]=s.split('-').map(Number);return new Date(a,b-1,c);}
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const dstr=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const monthKey=(d=new Date())=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
const dow=()=>new Date().getDay();
function daysBetween(a,b){return Math.round((parseD(b)-parseD(a))/86400000);}
let _uidc=0;
function uid(){_uidc++;return 'q'+Date.now().toString(36)+'_'+_uidc;}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function money(n){const c=(S&&S.finance&&S.finance.currency)||'₹';return c+Math.round(n).toLocaleString();}

const STATS={
  STR:{name:'Strength', cls:'str', desc:'Training, the gym, building the body.'},
  VIT:{name:'Vitality', cls:'vit', desc:'Nutrition, hydration & sleep.'},
  AGI:{name:'Agility',  cls:'agi', desc:'Cardio, steps & movement.'},
  INT:{name:'Intellect',cls:'int', desc:'Study, reading & skills.'},
  PER:{name:'Focus',    cls:'per', desc:'Work, deep focus & productivity.'},
  SEN:{name:'Sense',    cls:'sen', desc:'Self-care, mindfulness & recovery.'},
  WLT:{name:'Wealth',   cls:'wlt', desc:'Money discipline — spend less, save more.'},
};
const THEMES={
  indigo:{a:'#6fb0ff',b:'#b489ff',d:'#3f7fe0'},
  emerald:{a:'#6cf0b6',b:'#9bf0d2',d:'#38b083'},
  amber:{a:'#ffc46b',b:'#ffd99a',d:'#cc9440'},
  rose:{a:'#ff97a8',b:'#ffb8c4',d:'#d06579'},
  cyan:{a:'#6fd9ec',b:'#9be8f4',d:'#3aa2b4'},
};
function applyTheme(){const t=THEMES[S.theme]||THEMES.indigo;const r=document.documentElement.style;r.setProperty('--accent',t.a);r.setProperty('--accent2',t.b);r.setProperty('--accent-d',t.d);}

/* ---------- preset quest library ---------- */
const PRESETS={
 'Fitness':[
   {title:'Workout / gym session',stat:'STR',xp:55,gold:50,days:[1,2,3,4,5]},
   {title:'10,000 steps',stat:'AGI',xp:30,gold:30,days:ALL,key:true},
   {title:'Home workout (bodyweight)',stat:'STR',xp:40,gold:40,days:[1,3,5]},
   {title:'Stretch / mobility 10 min',stat:'AGI',xp:15,gold:15,days:ALL},
   {title:'Cardio 30 min',stat:'AGI',xp:35,gold:35,days:[2,4,6]},
   {title:'Yoga / flexibility 20 min',stat:'AGI',xp:25,gold:25,days:[0,3,6]},
   {title:'Hit your move/activity goal',stat:'AGI',xp:20,gold:20,days:ALL},
 ],
 'Nutrition':[
   {title:'Hit protein target',stat:'VIT',xp:40,gold:35,days:ALL,key:true},
   {title:'Stay in calorie budget',stat:'VIT',xp:35,gold:30,days:ALL},
   {title:'Drink water (3 L)',stat:'VIT',xp:15,gold:10,days:ALL},
   {title:'No junk / no delivery',stat:'VIT',xp:20,gold:25,days:ALL},
   {title:'Cook a healthy meal',stat:'VIT',xp:20,gold:20,days:ALL},
   {title:'Eat 2+ servings veg/fruit',stat:'VIT',xp:15,gold:15,days:ALL},
   {title:'No sugar today',stat:'VIT',xp:20,gold:25,days:ALL},
 ],
 'Mind & Skill':[
   {title:'Study / learn 30 min',stat:'INT',xp:50,gold:50,days:ALL,key:true},
   {title:'Read 10 pages',stat:'INT',xp:25,gold:25,days:ALL},
   {title:'Practice a skill',stat:'INT',xp:40,gold:40,days:[1,2,3,4,5]},
   {title:'Learn something — log 1 thing',stat:'INT',xp:25,gold:25,days:ALL},
   {title:'Practice a language',stat:'INT',xp:30,gold:30,days:ALL},
   {title:'Online course — 1 lesson',stat:'INT',xp:35,gold:35,days:[1,2,3,4,5]},
 ],
 'Work & Focus':[
   {title:'Deep work block (60–90 min)',stat:'PER',xp:45,gold:40,days:[1,2,3,4,5],key:true},
   {title:'Plan top 3 tasks',stat:'PER',xp:15,gold:15,days:[1,2,3,4,5]},
   {title:'Clear one nagging task',stat:'PER',xp:25,gold:30,days:[1,2,3,4,5]},
   {title:'No phone first hour',stat:'PER',xp:20,gold:20,days:ALL},
   {title:'Finish your #1 task',stat:'PER',xp:35,gold:35,days:[1,2,3,4,5]},
   {title:'Tidy workspace',stat:'PER',xp:15,gold:15,days:ALL},
 ],
 'Self-care':[
   {title:'Morning skincare + SPF',stat:'SEN',xp:12,gold:8,days:ALL},
   {title:'Night routine',stat:'SEN',xp:12,gold:8,days:ALL},
   {title:'Meditate 10 min',stat:'SEN',xp:20,gold:20,days:ALL},
   {title:'Sleep on time',stat:'VIT',xp:25,gold:15,days:ALL,key:true},
   {title:'Journal / gratitude',stat:'SEN',xp:15,gold:15,days:ALL},
   {title:'No screens 1 hr before bed',stat:'VIT',xp:20,gold:20,days:ALL},
   {title:'Get sunlight / walk outside',stat:'SEN',xp:15,gold:15,days:ALL},
   {title:'Connect with a friend / family',stat:'SEN',xp:20,gold:25,days:ALL},
 ],
 'Money':[
   {title:"Track today's spending",stat:'WLT',xp:20,gold:15,days:ALL},
   {title:'No-spend day',stat:'WLT',xp:25,gold:30,days:ALL},
   {title:'Pack lunch / skip takeout',stat:'WLT',xp:15,gold:20,days:[1,2,3,4,5]},
   {title:'Review subscriptions',stat:'WLT',xp:20,gold:20,days:[0]},
   {title:'Move money to savings',stat:'WLT',xp:25,gold:25,days:[5]},
 ],
};

/* ---------- state ---------- */
let S=load();
function defaultState(){return{
  v:1, onboarded:false, theme:'indigo',
  profile:{name:'Hunter', startDate:todayStr(), units:'kg', goalWeight:null, weightOn:false},
  totalXp:0, gold:0, stats:{STR:0,VIT:0,AGI:0,INT:0,PER:0,SEN:0,WLT:0}, totalCompleted:0,
  quests:[], history:{}, weights:[],
  finance:{enabled:false, currency:'₹', income:0, savingsGoal:0, budgets:[], spends:{}},
  rewards:[
    {id:'r1',ic:'☕',name:'Coffee / treat',cost:150},
    {id:'r2',ic:'🍔',name:'Cheat meal',cost:350},
    {id:'r3',ic:'🎮',name:'2 hrs gaming / a show',cost:250},
    {id:'r4',ic:'🎬',name:'Movie / night out',cost:500},
    {id:'r5',ic:'😴',name:'Guilt-free sleep-in',cost:400},
    {id:'r6',ic:'🛍️',name:'Buy something you want',cost:1500},
  ],
  redeemed:[], premium:false, lastOpen:todayStr(), lastRecap:null,
  achievements:[], challengeClaimed:{}, tourDone:false, sound:true, lastLoot:null,
};}
function normalize(s){
  const d=defaultState();
  if(!s||typeof s!=='object'||!s.profile)return d;
  s.profile=Object.assign({},d.profile,s.profile);
  s.stats=Object.assign({},d.stats,s.stats||{});
  s.finance=Object.assign({},d.finance,s.finance||{});
  if(!Array.isArray(s.finance.budgets))s.finance.budgets=[];
  if(!s.finance.spends||typeof s.finance.spends!=='object')s.finance.spends={};
  if(!Array.isArray(s.quests))s.quests=[];
  const sid=x=>String(x).replace(/[^A-Za-z0-9_]/g,'');
  s.quests=s.quests.filter(q=>q&&q.id&&q.title&&Array.isArray(q.days)).map(q=>({id:sid(q.id)||uid(),title:String(q.title).slice(0,120),stat:STATS[q.stat]?q.stat:'PER',xp:+q.xp||20,gold:+q.gold||15,days:q.days.filter(n=>n>=0&&n<=6),key:!!q.key,note:q.note?String(q.note).slice(0,200):''}));
  if(!s.history||typeof s.history!=='object')s.history={};
  if(!Array.isArray(s.weights))s.weights=[];
  if(!Array.isArray(s.rewards))s.rewards=d.rewards;
  s.rewards=s.rewards.filter(r=>r&&r.name).map(r=>({id:sid(r.id)||uid(),ic:r.ic?String(r.ic).slice(0,4):'🎁',name:String(r.name).slice(0,80),cost:Math.max(0,+r.cost||100)}));
  if(!Array.isArray(s.redeemed))s.redeemed=[];
  if(!Array.isArray(s.achievements))s.achievements=[];
  if(!s.challengeClaimed||typeof s.challengeClaimed!=='object')s.challengeClaimed={};
  ['totalXp','gold','totalCompleted'].forEach(k=>{if(typeof s[k]!=='number'||isNaN(s[k]))s[k]=0;});
  if(!s.theme||!THEMES[s.theme])s.theme='indigo';
  s.onboarded=!!s.onboarded;
  s.tourDone=!!s.tourDone;
  if(typeof s.sound!=='boolean')s.sound=true;
  if(s.lastLoot!==null&&typeof s.lastLoot!=='string')s.lastLoot=null;
  return s;
}
function load(){try{const r=JSON.parse(localStorage.getItem(STORE));return r&&r.profile?normalize(r):defaultState();}catch(e){return defaultState();}}
function save(){localStorage.setItem(STORE,JSON.stringify(S));}

/* ---------- achievements ---------- */
const ACHV=[
  {id:'first',ic:'🌱',name:'First Step',desc:'Clear your first quest',g:30,test:()=>S.totalCompleted>=1},
  {id:'q25',ic:'⚡',name:'Getting Going',desc:'Clear 25 quests',g:60,test:()=>S.totalCompleted>=25},
  {id:'q100',ic:'💯',name:'Centurion',desc:'Clear 100 quests',g:120,test:()=>S.totalCompleted>=100},
  {id:'q500',ic:'🏆',name:'Relentless',desc:'Clear 500 quests',g:300,test:()=>S.totalCompleted>=500},
  {id:'s7',ic:'🔥',name:'Week Warrior',desc:'7-day streak',g:80,test:()=>streakInfo().longest>=7},
  {id:'s30',ic:'🌋',name:'Unbreakable',desc:'30-day streak',g:200,test:()=>streakInfo().longest>=30},
  {id:'s100',ic:'👑',name:'Legend',desc:'100-day streak',g:500,test:()=>streakInfo().longest>=100},
  {id:'l5',ic:'⭐',name:'Rising',desc:'Reach level 5',g:60,test:()=>levelInfo(S.totalXp).level>=5},
  {id:'l15',ic:'✨',name:'Ascended',desc:'Reach level 15',g:150,test:()=>levelInfo(S.totalXp).level>=15},
  {id:'l30',ic:'🌟',name:'Elite',desc:'Reach level 30',g:300,test:()=>levelInfo(S.totalXp).level>=30},
  {id:'rich',ic:'💰',name:'Treasury',desc:'Hold 1000 gold',g:50,test:()=>S.gold>=1000},
  {id:'spend',ic:'🎁',name:'Treat Yourself',desc:'Redeem a reward',g:40,test:()=>S.redeemed.length>=1},
  {id:'build',ic:'🛠️',name:'Architect',desc:'Have 6+ quests',g:40,test:()=>S.quests.length>=6},
  {id:'til7',ic:'📝',name:'Reflective',desc:'Log 7 daily notes',g:60,test:()=>Object.values(S.history).filter(h=>h.til).length>=7},
  {id:'pweek',ic:'🎯',name:'Flawless Week',desc:'7 streak days in a week',g:120,test:()=>weekStats().perfect>=7},
];
function checkAchievements(silent){
  const newly=[];ACHV.forEach(a=>{if(!S.achievements.includes(a.id)&&a.test()){S.achievements.push(a.id);newly.push(a);}});
  if(newly.length){const bonus=newly.reduce((s,a)=>s+a.g,0);S.gold+=bonus;save();
    if(!silent){confetti();sfx('achv');const a=newly[0];sysModal('ACHIEVEMENT UNLOCKED','<div class="sys-big" style="font-size:44px">'+a.ic+'</div><div class="sys-big" style="font-size:18px">'+a.name+'</div><p class="center">'+a.desc+'<br><span class="hl">+'+a.g+' Gold</span>'+(newly.length>1?'<br><span class="tiny">+'+(newly.length-1)+' more unlocked 👀</span>':'')+'</p>',"BET 🏆",null,true);}else{sfx('achv');toast('🏅 '+newly[0].name+' unlocked — W');}}
  return newly.length;
}

/* ---------- quests ---------- */
function questsToday(){return S.quests.filter(q=>q.days.includes(dow()));}
function dayRecord(d=todayStr()){if(!S.history[d])S.history[d]={done:[],meta:{}};return S.history[d];}
function keystonesDue(ds){const dw=parseD(ds).getDay();return S.quests.filter(q=>q.key&&q.days.includes(dw));}
function dayCounts(ds){const rec=S.history[ds];if(!rec)return false;const ks=keystonesDue(ds);return ks.length>0&&ks.every(q=>rec.done.includes(q.id));}
function toggleQuest(q,ev){
  const rec=dayRecord(),i=rec.done.indexOf(q.id);
  if(i>=0){rec.done.splice(i,1);if(rec.meta)delete rec.meta[q.id];S.totalXp=Math.max(0,S.totalXp-q.xp);S.gold=Math.max(0,S.gold-q.gold);
    S.stats[q.stat]=Math.max(0,S.stats[q.stat]-1);S.totalCompleted=Math.max(0,S.totalCompleted-1);
    if(!dayCounts(todayStr()))rec.streakBonus=false;COMBO=0;sfx('undo');save();render();
  }else{
    const before=levelInfo(S.totalXp).level,beforeRank=rankFor(before);
    const now=Date.now();COMBO=(now-COMBO_T<10000)?COMBO+1:1;COMBO_T=now;
    const comboBonus=COMBO>=2?Math.min(30,(COMBO-1)*5):0;
    rec.done.push(q.id);rec.meta=rec.meta||{};rec.meta[q.id]={t:q.title,s:q.stat,xp:q.xp};
    S.totalXp+=q.xp;S.gold+=q.gold+comboBonus;S.stats[q.stat]+=1;S.totalCompleted+=1;save();
    if(navigator.vibrate)navigator.vibrate(COMBO>=3?[10,30,10]:14);
    sfx('tick');sfx('coin');
    if(ev){floatText(ev.clientX,ev.clientY-8,'+'+q.xp+' XP',getCss('--accent'));setTimeout(()=>floatText(ev.clientX+20,ev.clientY-2,'+'+(q.gold+comboBonus)+' G',getCss('--gold')),110);}
    const after=levelInfo(S.totalXp).level,afterRank=rankFor(after);
    let shown=false;
    if(afterRank!==beforeRank){render();sfx('rank');rankUpMsg(afterRank);shown=true;}
    else if(after>before){render();sfx('level');levelUpMsg(after);shown=true;}
    else {if(COMBO>=2){comboPop(COMBO);sfx('combo');}toast(hypeToast(q.xp,q.gold+comboBonus,COMBO));render();}
    if(dayCounts(todayStr())&&!rec.streakBonus){rec.streakBonus=true;const cur=streakInfo().cur,bonus=20+Math.min(80,cur*5);S.totalXp+=bonus;S.gold+=bonus;save();
      const milestone=[7,14,30,50,100,200].includes(cur);sfx('loot');
      if(!shown||milestone){sysModal(milestone?'STREAK MILESTONE':'STREAK SECURED','<div class="sys-big">🔥 '+cur+'-DAY STREAK</div><p class="center">'+(milestone?cur+' days straight — absolutely locked in 🔒 you\'re built different.':'Keystones done ✅ streak safe for today. Don\'t break the chain.')+'<br><span class="hl">+'+bonus+' XP · +'+bonus+' Gold</span></p>','KEEP IT UP',null,milestone);}
      shown=true;render();}
    checkAchievements(shown);
    checkChallenge();
  }
}
function qtap(id,ev){const q=S.quests.find(x=>x.id===id);if(q)toggleQuest(q,ev);}
function qexp(id){const e=$('#exp_'+id),b=$('#eb_'+id);if(!e)return;const h=e.classList.toggle('hidden');if(b)b.textContent=h?'▾ details':'▴ hide';}

/* ---------- leveling ---------- */
function xpForLevel(l){return 80+(l-1)*60;}
function levelInfo(t){let l=1,rem=t;while(rem>=xpForLevel(l)){rem-=xpForLevel(l);l++;}return{level:l,into:rem,need:xpForLevel(l)};}
function rankFor(l){return l>=50?'S':l>=35?'A':l>=20?'B':l>=10?'C':l>=5?'D':'E';}
function titleFor(l){return l>=50?'Sovereign':l>=35?'Monarch':l>=20?'Elite':l>=10?'Awakened':l>=5?'Rising':'Player';}
function streakInfo(){
  let cur=0,d=new Date();if(!dayCounts(todayStr()))d.setDate(d.getDate()-1);
  while(true){const ds=dstr(d);if(dayCounts(ds)){cur++;d.setDate(d.getDate()-1);}else break;}
  let longest=0,run=0,prev=null;
  for(const ds of Object.keys(S.history).sort()){if(!dayCounts(ds)){run=0;prev=ds;continue;}
    if(prev&&daysBetween(prev,ds)===1&&dayCounts(prev))run++;else run=1;longest=Math.max(longest,run);prev=ds;}
  return{cur,longest:Math.max(longest,cur)};
}
/* current consecutive completions of ONE quest, counted only on its scheduled days.
   today not-yet-done is a grace (doesn't break); any earlier missed scheduled day breaks. */
function questStreak(q){
  if(!q.days||!q.days.length)return 0;
  let streak=0,seen=false;const d=new Date(),today=todayStr();
  for(let i=0;i<420;i++){
    if(q.days.includes(d.getDay())){
      const ds=dstr(d),rec=S.history[ds],done=rec&&rec.done.includes(q.id);
      if(done){streak++;}
      else if(!seen&&ds===today){/* today still open — grace */}
      else break;
      seen=true;
    }
    d.setDate(d.getDate()-1);
  }
  return streak;
}

/* ---------- history helpers ---------- */
function dayXp(rec){if(!rec)return 0;return rec.meta?Object.values(rec.meta).reduce((a,b)=>a+(b.xp||0),0):0;}
function prettyDate(ds){return parseD(ds).toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'});}
function weekStats(){let xp=0,cleared=0,perfect=0;const byStat={};Object.keys(STATS).forEach(k=>byStat[k]=0);const d=new Date();
  for(let i=0;i<7;i++){const dd=new Date(d);dd.setDate(d.getDate()-i);const ds=dstr(dd),rec=S.history[ds];if(!rec)continue;
    xp+=dayXp(rec);cleared+=rec.done.length;if(dayCounts(ds))perfect++;
    if(rec.meta)Object.values(rec.meta).forEach(m=>{if(m.s&&byStat[m.s]!==undefined)byStat[m.s]++;});}
  return{xp,cleared,perfect,byStat};}
function attrExpect(){const e={};Object.keys(STATS).forEach(k=>e[k]=0);S.quests.forEach(q=>e[q.stat]+=q.days.length);return e;}
function attrScores(days=14){const cnt={};Object.keys(STATS).forEach(k=>cnt[k]=0);const d=new Date();
  for(let i=0;i<days;i++){const dd=new Date(d);dd.setDate(d.getDate()-i);const rec=S.history[dstr(dd)];
    if(rec&&rec.meta)Object.values(rec.meta).forEach(m=>{if(m.s!==undefined&&cnt[m.s]!==undefined)cnt[m.s]++;});}
  const wk=attrExpect(),sc={};Object.keys(STATS).forEach(k=>{const exp=(wk[k]/7)*days;sc[k]=exp>0?Math.min(100,Math.round(cnt[k]/exp*100)):0;});return sc;}

  const recent=S.redeemed.slice(-5).reverse().map(r=>'<div class="tiny" style="padding:5px 0">✔ '+esc(r.name)+' — '+r.cost+'G <span style="float:right">'+r.date.slice(5)+'</span></div>').join('')||'<div class="empty">Nothing claimed yet.</div>';

   '<div class="panel"><div class="panel-title"><span class="dot"></span>Reward Shop</div>'+cards+'<button class="btn ghost sm" style="margin-top:6px" onclick="addReward()">+ ADD REWARD</button></div>'+

function redeem(id){const r=S.rewards.find(x=>x.id===id);if(!r||S.gold<r.cost)return;S.gold-=r.cost;S.redeemed.push({name:r.name,cost:r.cost,date:todayStr()});save();if(navigator.vibrate)navigator.vibrate([20,40,20]);sfx('loot');sysModal('REWARD UNLOCKED','<div class="sys-big" style="font-size:44px">'+(r.ic||'🎁')+'</div><p class="center">Copped <b>'+esc(r.name)+'</b> for <span class="hl">'+r.cost+' gold</span>.<br>Zero guilt — you earned this one 😎</p>','LFG 🔥');checkAchievements(true);render();}
function delReward(id){if(confirm('Remove this reward?')){S.rewards=S.rewards.filter(x=>x.id!==id);save();$('#modal-host').innerHTML='';render();}}
let RF={};
function rewardForm(id){const r=id?S.rewards.find(x=>x.id===id):null;RF=r?{...r}:{id:null,ic:'🎁',name:'',cost:300};
  sysModal(id?'EDIT REWARD':'NEW REWARD',
   '<label>Emoji icon</label><input id="rf_ic" value="'+esc(RF.ic)+'" maxlength="4" placeholder="🎁">'+
   '<label>Reward name</label><input id="rf_n" value="'+esc(RF.name)+'" placeholder="e.g. Movie night">'+
   '<label>Cost (gold)</label><input id="rf_c" type="number" inputmode="numeric" value="'+RF.cost+'">'+
   '<button class="btn" style="margin-top:14px" onclick="saveReward()">SAVE</button>'+
   (id?'<button class="btn danger sm" style="margin-top:8px" onclick="delReward(\''+id+'\')">DELETE REWARD</button>':''),'CANCEL');}
function saveReward(){const n=$('#rf_n').value.trim();if(!n){toast('Add a name');return;}const ic=$('#rf_ic').value.trim()||'🎁';const cost=Math.max(0,parseInt($('#rf_c').value)||0);
  if(RF.id){const r=S.rewards.find(x=>x.id===RF.id);if(r)Object.assign(r,{ic,name:n,cost});}else{S.rewards.push({id:uid(),ic,name:n,cost});}
  save();$('#modal-host').innerHTML='';render();toast('Saved');}
function addReward(){rewardForm();}

/* ============================================================ LOG */
function viewLog(){
  const today=new Date();let header=['S','M','T','W','T','F','S'].map(d=>'<div class="dow">'+d+'</div>').join('');
  let pre=new Date();pre.setDate(pre.getDate()-34);pre.setDate(pre.getDate()-pre.getDay());let cells='';
  for(let i=0;i<42;i++){const d=new Date(pre);d.setDate(pre.getDate()+i);const ds=dstr(d);const rec=S.history[ds];let cls='cell';const future=d>today;
    if(dayCounts(ds))cls+=' full';else if(rec&&rec.done.length)cls+=' partial';if(ds===todayStr())cls+=' today';
    cells+='<div class="'+cls+'" '+(future?'':'onclick="dayDetail(\''+ds+'\')"')+' style="'+(future?'opacity:.25':'cursor:pointer')+'">'+d.getDate()+'</div>';}
  const wk=weekStats();
  const tils=Object.keys(S.history).filter(k=>S.history[k].til).sort().reverse().slice(0,14).map(k=>'<div class="til-row"><div class="td">'+prettyDate(k)+'</div><div class="tt">'+esc(S.history[k].til)+'</div></div>').join('')||'<div class="empty">No notes yet — add one on Home.</div>';
  const weightPanel=S.profile.weightOn?weightPanelHTML():'';
  return '<div class="panel"><div class="panel-title"><span class="dot"></span>Quest Calendar</div><div class="cal">'+header+cells+'</div><p class="tiny" style="margin-top:11px"><span style="color:var(--accent)">■</span> streak day · <span style="color:var(--accent2)">■</span> partial · <span style="color:var(--gold)">▢</span> today — tap any day</p></div>'+
   '<div class="panel"><div class="panel-title"><span class="dot"></span>Last 14 Days · XP</div><canvas id="activity" height="90" style="width:100%;display:block"></canvas><p class="tiny" style="margin-top:8px">This week: <b style="color:var(--orange)">'+wk.perfect+'</b> streak days · <b style="color:var(--accent)">'+wk.cleared+'</b> quests · <b style="color:var(--gold)">'+wk.xp+'</b> XP.</p></div>'+
   weightPanel+
   '<div class="panel"><div class="panel-title"><span class="dot" style="background:var(--green)"></span>📝 Learning Log</div>'+tils+'</div>';
}
function weightStats(){
  const ws=S.weights;if(!ws.length)return null;const u=S.profile.units;const goal=S.profile.goalWeight;
  const cur=ws[ws.length-1].kg,start=ws[0].kg,last=ws[ws.length-1].date;
  let weekAgo=null;for(let i=ws.length-1;i>=0;i--){if(daysBetween(ws[i].date,last)>=7){weekAgo=ws[i].kg;break;}}
  const dTotal=+(cur-start).toFixed(1),dWeek=weekAgo!=null?+(cur-weekAgo).toFixed(1):null;
  let pct=null,toGo=null,reached=false;
  if(goal!=null&&goal!==start){pct=Math.max(0,Math.min(100,Math.round((start-cur)/(start-goal)*100)));toGo=+Math.abs(cur-goal).toFixed(1);reached=start>goal?cur<=goal:cur>=goal;}
  else if(goal!=null){pct=100;toGo=0;reached=true;}
  // direction that counts as progress toward goal (or just "down" if no goal)
  const wantDown=goal!=null?start>goal:true;
  return{cur,start,goal,dTotal,dWeek,pct,toGo,reached,wantDown,n:ws.length,u};
}
function deltaTag(d,wantDown){if(d==null)return '<span class="flat">—</span>';if(d===0)return '<span class="flat">±0</span>';const good=(d<0)===wantDown;const arrow=d<0?'↓':'↑';return '<span class="'+(good?'down':'up')+'">'+arrow+' '+Math.abs(d)+'</span>';}
function weightPanelHTML(){
  const w=weightStats(),u=S.profile.units;
  let head;
  if(!w){head='<div class="empty" style="padding:8px 0">Log your weight below to start tracking trend &amp; goal progress.</div>';}
  else{
    const goalCard=w.goal!=null?'<div class="wc"><b style="color:var(--gold)">'+w.goal+'</b><span>Goal '+u+'</span></div>':'<div class="wc"><b style="color:var(--muted)">—</b><span>Set goal ⚙</span></div>';
    const cards='<div class="wstat"><div class="wc"><b>'+w.start+'</b><span>Start '+u+'</span></div><div class="wc now"><b style="color:var(--accent)">'+w.cur+'</b><span>Now '+u+'</span></div>'+goalCard+'</div>';
    let prog='';
    if(w.goal!=null&&w.pct!=null){
      prog='<div class="wgoal"><span>'+(w.reached?'🎉 Goal reached!':'Progress to goal')+'</span><span class="num">'+(w.reached?'100%':w.pct+'% · '+w.toGo+' '+u+' to go')+'</span></div><div class="bar"><i style="width:'+w.pct+'%;background:linear-gradient(90deg,var(--accent),var(--gold))"></i></div>';
    }
    const summary='<p class="tiny" style="margin-top:11px">This week: <b>'+deltaTag(w.dWeek,w.wantDown)+' '+u+'</b> · Since start: <b>'+deltaTag(w.dTotal,w.wantDown)+' '+u+'</b> · '+w.n+' log'+(w.n>1?'s':'')+'</p>';
    head=cards+prog+summary;
  }
  return '<div class="panel"><div class="panel-title"><span class="dot"></span>Weight Tracker</div>'+head+
    '<canvas id="wchart" height="130" style="width:100%;margin-top:12px"></canvas>'+
    '<div class="wlog"><input id="wkg" type="number" inputmode="decimal" step="0.1" placeholder="today\'s weight ('+u+')"><button class="btn sm" style="width:auto;padding:12px 18px" onclick="logWeight()">LOG</button></div>'+
    '<p class="tiny" style="margin-top:7px;color:var(--muted)">Logs once per day — re-log to overwrite today. Set a goal weight in ⚙ Settings.</p></div>';
}
function logWeight(){const v=parseFloat($('#wkg').value);if(!v)return;const d=todayStr();const ex=S.weights.find(w=>w.date===d);if(ex)ex.kg=v;else S.weights.push({date:d,kg:v});S.weights.sort((a,b)=>a.date<b.date?-1:1);save();toast('Weight logged');checkAchievements(true);render();}
function drawWeightChart(){const c=$('#wchart');if(!c||!c.clientWidth)return;const dpr=window.devicePixelRatio||1,w=c.clientWidth,h=130;c.width=w*dpr;c.height=h*dpr;const x=c.getContext('2d');x.scale(dpr,dpr);const data=S.weights.slice(-30);if(!data.length){x.fillStyle='#868da4';x.font='12px Sora';x.textAlign='center';x.fillText('Log your weight to see the trend.',w/2,h/2);return;}
  const u=S.profile.units,goal=S.profile.goalWeight;const ys=data.map(d=>d.kg).concat(goal?[goal]:[]);let mn=Math.min(...ys),mx=Math.max(...ys);const pad=Math.max(0.6,(mx-mn)*0.18);mn-=pad;mx+=pad;if(mx-mn<1){mx+=.5;mn-=.5;}
  const L=8,R=w-40,T=12,B=h-16;const px=i=>data.length<2?(L+R)/2:L+i*(R-L)/(data.length-1),py=v=>T+(mx-v)/(mx-mn)*(B-T);
  const acc=getCss('--accent').trim()||'#6fb0ff';
  if(goal){const gy=py(goal);x.strokeStyle='rgba(236,199,126,.55)';x.setLineDash([5,4]);x.beginPath();x.moveTo(L,gy);x.lineTo(R,gy);x.stroke();x.setLineDash([]);x.fillStyle='rgba(236,199,126,.85)';x.font='600 9px Space Grotesk';x.textAlign='left';x.fillText('goal '+goal,R+3,gy+3);}
  // area fill
  x.beginPath();data.forEach((d,i)=>{i?x.lineTo(px(i),py(d.kg)):x.moveTo(px(i),py(d.kg));});x.lineTo(px(data.length-1),B);x.lineTo(px(0),B);x.closePath();const g=x.createLinearGradient(0,T,0,B);g.addColorStop(0,'rgba(111,176,255,.22)');g.addColorStop(1,'rgba(111,176,255,0)');x.fillStyle=g;x.fill();
  // line
  x.strokeStyle=acc;x.lineWidth=2;x.beginPath();data.forEach((d,i)=>{i?x.lineTo(px(i),py(d.kg)):x.moveTo(px(i),py(d.kg));});x.stroke();
  x.fillStyle=acc;data.forEach((d,i)=>{x.beginPath();x.arc(px(i),py(d.kg),i===data.length-1?4:2.5,0,7);x.fill();});
  // last value label
  const lv=data[data.length-1].kg,lvy=py(lv);x.fillStyle='#eef0f7';x.font='700 10px Space Grotesk';x.textAlign='left';x.fillText(lv+' '+u,Math.min(px(data.length-1)+6,R-2),Math.max(T+6,lvy-6));
  // min/max y labels
  x.fillStyle='#7e8aac';x.font='9px Space Grotesk';x.textAlign='left';x.fillText(mx.toFixed(1),R+3,T+4);x.fillText(mn.toFixed(1),R+3,B);}
function drawActivity(){const c=$('#activity');if(!c||!c.clientWidth)return;const dpr=window.devicePixelRatio||1,w=c.clientWidth,h=90;c.width=w*dpr;c.height=h*dpr;const x=c.getContext('2d');x.scale(dpr,dpr);const days=[];const d=new Date();d.setDate(d.getDate()-13);for(let i=0;i<14;i++){const dd=new Date(d);dd.setDate(d.getDate()+i);const ds=dstr(dd);days.push({xp:dayXp(S.history[ds]),full:dayCounts(ds)});}const max=Math.max(60,...days.map(o=>o.xp)),gap=4,bw=(w-13*gap)/14;days.forEach((o,i)=>{const bh=Math.max(2,o.xp/max*(h-12)),pxx=i*(bw+gap);x.fillStyle=o.full?getCss('--accent'):'rgba(148,166,255,0.35)';rr(x,pxx,h-bh,bw,bh,3);x.fill();});}
function rr(x,a,b,w,h,r){r=Math.min(r,w/2,h/2);x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();}
function dayDetail(ds){const rec=S.history[ds];let body;if(!rec||!rec.done.length){body='<p class="center tiny">Nothing cleared this day.</p>';}else{const meta=rec.meta||{};const items=rec.done.map(id=>{const m=meta[id]||{};return '<div class="fixed-row"><span>'+esc(m.t||id)+' '+(m.s?'<span class="tiny">'+m.s+'</span>':'')+'</span><span class="amt">'+(m.xp?'+'+m.xp+' XP':'✓')+'</span></div>';}).join('');const til=rec.til?'<div class="tiny" style="margin-top:12px;padding:10px;background:rgba(0,0,0,.2);border-radius:10px">📝 '+esc(rec.til)+'</div>':'';body='<p class="center" style="margin-bottom:12px">'+(dayCounts(ds)?'<span style="color:var(--orange)">🔥 Streak day</span>':'<span style="color:var(--accent2)">'+rec.done.length+' cleared</span>')+' · '+dayXp(rec)+' XP</p>'+items+til;}sysModal(prettyDate(ds),body,'CLOSE');}

function viewCodex(){const tabs=[['how','HOW TO USE'],['quests','BUILDING QUESTS'],['streak','STREAKS'],['money','MONEY'],['mind','MINDSET']];return '<div class="codex-tabs">'+tabs.map(t=>'<button class="'+(CODEXTAB===t[0]?'active':'')+'" onclick="setCodex(\''+t[0]+'\')">'+t[1]+'</button>').join('')+'</div><div class="panel cx">'+CODEX[CODEXTAB]+'</div>';}

/* ============================================================ QUEST MANAGER */
function manageQuests(){
  const list=S.quests.length?S.quests.map(q=>{const rn=questStreak(q);return '<div class="qedit"><div class="qi"><div class="t">'+esc(q.title)+'</div><div class="m">'+q.stat+' · '+freqLabel(q.days)+' · +'+q.xp+'XP'+(rn>=2?' · <span style="color:var(--orange)">🔥'+rn+'</span>':'')+'</div></div><button class="star" onclick="toggleKey(\''+q.id+'\')">'+(q.key?'⭐':'☆')+'</button><button class="ed" onclick="editQuest(\''+q.id+'\')">✎</button><button class="dl" onclick="delQuest(\''+q.id+'\')">✕</button></div>';}).join(''):'<div class="empty">No quests yet.</div>';
  sysModal('MANAGE QUESTS',list+'<button class="btn" style="margin-top:14px" onclick="editQuest()">+ NEW QUEST</button><button class="btn ghost sm" style="margin-top:8px" onclick="presetPicker()">+ ADD FROM LIBRARY</button><p class="tiny center" style="margin-top:10px">⭐ = keystone (protects your streak). Aim for 2–3.</p>','DONE');
}
function freqLabel(days){if(days.length===7)return'Daily';if(days.length===5&&!days.includes(0)&&!days.includes(6))return'Weekdays';if(days.length===1)return DAYNAMES[days[0]];return days.map(d=>DAYNAMES[d][0]).join('');}
function toggleKey(id){const q=S.quests.find(x=>x.id===id);if(!q)return;q.key=!q.key;save();manageQuests();}
function delQuest(id){if(confirm('Delete this quest?')){S.quests=S.quests.filter(x=>x.id!==id);save();manageQuests();}}
let QE={};
function editQuest(id){const q=id?S.quests.find(x=>x.id===id):null;QE=q?{...q,days:[...q.days]}:{id:null,title:'',stat:'STR',xp:35,gold:30,days:[...ALL],key:false,note:'',diff:'med'};if(!QE.diff)QE.diff=QE.xp>=50?'hard':QE.xp<=20?'easy':'med';renderQE();}
function renderQE(){
  const stats=Object.keys(STATS).map(k=>'<button class="'+(QE.stat===k?'sel':'')+'" onclick="qeStat(\''+k+'\')">'+k+'</button>').join('');
  const diffs=[['easy','Easy'],['med','Medium'],['hard','Hard']].map(d=>'<button class="'+(QE.diff===d[0]?'sel':'')+'" onclick="qeDiff(\''+d[0]+'\')">'+d[1]+'</button>').join('');
  const freqs=[['daily','Daily'],['weekdays','Weekdays'],['custom','Custom']].map(f=>'<button class="'+(qeFreq()===f[0]?'sel':'')+'" onclick="qeFreq(\''+f[0]+'\')">'+f[1]+'</button>').join('');
  const customDays=qeFreq()==='custom'?'<div class="chipsel" style="margin-top:8px">'+DAYNAMES.map((d,i)=>'<button class="'+(QE.days.includes(i)?'sel':'')+'" onclick="qeDay('+i+')">'+d+'</button>').join('')+'</div>':'';
  sysModal(QE.id?'EDIT QUEST':'NEW QUEST',
    '<label>Quest title</label><input id="qe_t" value="'+esc(QE.title)+'" placeholder="e.g. Read 10 pages">'+
    '<label>Attribute it trains</label><div class="chipsel">'+stats+'</div>'+
    '<label>Difficulty (sets XP & gold)</label><div class="chipsel">'+diffs+'</div>'+
    '<label>Repeats</label><div class="chipsel">'+freqs+'</div>'+customDays+
    '<label style="margin-top:14px">Note / details (optional)</label><input id="qe_note" value="'+esc(QE.note||'')+'" placeholder="e.g. after lunch · 20 min">'+
    '<label style="margin-top:12px"><input type="checkbox" id="qe_k" '+(QE.key?'checked':'')+' style="width:auto;margin-right:8px">⭐ Keystone (protects streak)</label>'+
    '<button class="btn" style="margin-top:14px" onclick="saveQuest()">SAVE QUEST</button>','CANCEL',()=>manageQuests());
}
function qeSync(){const t=$('#qe_t');if(t&&t.value!==undefined)QE.title=t.value;const k=$('#qe_k');if(k)QE.key=k.checked;const n=$('#qe_note');if(n&&n.value!==undefined)QE.note=n.value;}
function qeStat(k){qeSync();QE.stat=k;renderQE();}
function qeDiff(d){qeSync();QE.diff=d;const map={easy:[15,10],med:[35,30],hard:[55,50]};QE.xp=map[d][0];QE.gold=map[d][1];renderQE();}
function qeFreq(f){if(f===undefined){if(QE.days.length===7)return'daily';if(QE.days.length===5&&!QE.days.includes(0)&&!QE.days.includes(6))return'weekdays';return'custom';}qeSync();if(f==='daily')QE.days=[...ALL];else if(f==='weekdays')QE.days=[1,2,3,4,5];else if(QE.days.length===7||QE.days.length===5)QE.days=[1,3,5];renderQE();}
function qeDay(i){qeSync();const j=QE.days.indexOf(i);if(j>=0)QE.days.splice(j,1);else QE.days.push(i);QE.days.sort();renderQE();}
function saveQuest(){qeSync();const t=(QE.title||'').trim();if(!t){toast('Add a title');return;}if(!QE.days.length)QE.days=[...ALL];const note=(QE.note||'').trim();
  if(QE.id){const q=S.quests.find(x=>x.id===QE.id);if(q)Object.assign(q,{title:t,stat:QE.stat,xp:QE.xp,gold:QE.gold,days:QE.days,key:QE.key,note});}
  else{S.quests.push({id:uid(),title:t,stat:QE.stat,xp:QE.xp,gold:QE.gold,days:QE.days,key:QE.key,note});}
  save();manageQuests();}
function presetPicker(){let html='';Object.keys(PRESETS).forEach(area=>{html+='<h4 style="font-family:Space Grotesk;font-size:12px;color:var(--accent);margin:14px 0 6px">'+area+'</h4>';PRESETS[area].forEach((p,i)=>{const added=S.quests.some(q=>q.title===p.title);html+='<div class="preset"><div class="qi" style="flex:1"><div class="t" style="font-size:14px">'+esc(p.title)+'</div><div class="m" style="font-size:10.5px;color:var(--muted)">'+p.stat+' · '+freqLabel(p.days)+(p.key?' · ⭐':'')+'</div></div><button class="btn ghost sm" style="width:auto;padding:8px 12px" '+(added?'disabled':'')+' onclick="addPreset(\''+area+'\','+i+')">'+(added?'Added':'+ Add')+'</button></div>';});});
  sysModal('QUEST LIBRARY',html,'DONE',()=>manageQuests());}
function addPreset(area,i){const p=PRESETS[area][i];if(S.quests.some(q=>q.title===p.title))return;S.quests.push({id:uid(),title:p.title,stat:p.stat,xp:p.xp,gold:p.gold,days:[...p.days],key:!!p.key});save();toast('Added: '+p.title);presetPicker();}

/* ============================================================ ONBOARDING */
let OB={};
function startOnboarding(){OB={step:0,name:'',units:'kg',currency:'₹',areas:new Set(),chosen:new Set(),wantMoney:false,wantWeight:false};renderOB();}
function renderOB(){
  const steps=[obWelcome,obProfile,obAreas,obQuests,obKeystones,obFinish];
  $('#modal-host').innerHTML='<div class="overlay"><div class="sys"><div class="sys-h">SET UP · STEP '+(OB.step+1)+' / 6</div>'+steps[OB.step]()+'</div></div>';
}
function obNext(){const s=OB.step;
  if(s===1){const n=$('#ob_name').value.trim();OB.name=n||'Hunter';OB.units=$('#ob_units').value;OB.currency=$('#ob_cur').value.trim()||'₹';}
  OB.step++;renderOB();}
function obBack(){OB.step--;renderOB();}
function obWelcome(){return '<div class="center" style="font-size:30px">◇</div><div class="sys-big" style="font-size:19px">WELCOME, PLAYER</div><p>The System turns your goals into <b>daily quests</b>. Clear them → earn XP, level up, build streaks & unlock rewards you pick. Basically your life, but a game 🎮</p><p class="center tiny">~1 min to set up. Everything stays on your device.</p><button class="btn" style="margin-top:16px" onclick="obNext()">LET\'S GO 🚀</button>';}
function obProfile(){return '<label>What should we call you?</label><input id="ob_name" value="'+esc(OB.name)+'" placeholder="Your name">'+
  '<div class="row2"><div><label>Weight unit</label><select id="ob_units"><option value="kg"'+(OB.units==='kg'?' selected':'')+'>kg</option><option value="lb"'+(OB.units==='lb'?' selected':'')+'>lb</option></select></div><div><label>Currency</label><input id="ob_cur" value="'+esc(OB.currency)+'" maxlength="3"></div></div>'+
  '<button class="btn" style="margin-top:16px" onclick="obNext()">NEXT</button><button class="btn ghost sm" style="margin-top:8px" onclick="obBack()">Back</button>';}
function obAreas(){const areas=Object.keys(PRESETS);return '<div class="sys-big" style="font-size:18px">What do you want to work on?</div><p class="center tiny">Pick any that fit — we\'ll suggest quests.</p><div class="ob-areas">'+areas.map(a=>'<button class="'+(OB.areas.has(a)?'sel':'')+'" onclick="obArea(\''+a+'\')">'+a+'</button>').join('')+'</div><button class="btn" style="margin-top:18px" onclick="obAreasNext()">NEXT</button><button class="btn ghost sm" style="margin-top:8px" onclick="obBack()">Back</button>';}
function obArea(a){if(OB.areas.has(a))OB.areas.delete(a);else OB.areas.add(a);if(a==='Money')OB.wantMoney=OB.areas.has('Money');renderOB();}
function obAreasNext(){if(!OB.areas.size){toast('Pick at least one');return;}
  // preselect recommended (keystones + first of each)
  OB.chosen=new Set();OB.areas.forEach(a=>PRESETS[a].forEach((p,i)=>{if(p.key||i===0)OB.chosen.add(a+'|'+i);}));OB.step++;renderOB();}
function obQuests(){let html='<div class="sys-big" style="font-size:18px">Pick your quests</div><p class="center tiny">Tick the ones you want. Add or change any later.</p>';
  [...OB.areas].forEach(a=>{html+='<h4 style="font-family:Space Grotesk;font-size:12px;color:var(--accent);margin:14px 0 4px">'+a+'</h4>';PRESETS[a].forEach((p,i)=>{const k=a+'|'+i,sel=OB.chosen.has(k);html+='<div class="preset"><button class="qcheck '+(sel?'':'')+'" onclick="obPick(\''+k+'\')" style="'+(sel?'background:linear-gradient(150deg,var(--accent),var(--accent2));border-color:transparent;color:#0a0b10':'')+'">'+(sel?'✓':'')+'</button><div class="qi" style="flex:1;margin-left:10px"><div class="t" style="font-size:13.5px">'+esc(p.title)+'</div><div class="m" style="font-size:10px;color:var(--muted)">'+p.stat+' · '+freqLabel(p.days)+(p.key?' · ⭐ suggested keystone':'')+'</div></div></div>';});});
  html+='<button class="btn" style="margin-top:16px" onclick="obQuestsNext()">NEXT</button><button class="btn ghost sm" style="margin-top:8px" onclick="obBack()">Back</button>';return html;}
function obPick(k){if(OB.chosen.has(k))OB.chosen.delete(k);else OB.chosen.add(k);renderOB();}
function obQuestsNext(){if(!OB.chosen.size){toast('Pick at least one quest');return;}OB.step++;renderOB();}
function obKeystones(){const chosen=[...OB.chosen].map(k=>{const[a,i]=k.split('|');return {k,p:PRESETS[a][+i]};});
  if(!OB.keystones)OB.keystones=new Set(chosen.filter(c=>c.p.key).slice(0,3).map(c=>c.k));
  let html='<div class="sys-big" style="font-size:18px">Choose keystones</div><p class="center tiny">Pick <b>2–3</b> that matter most — only these protect your daily streak.</p>';
  chosen.forEach(c=>{const sel=OB.keystones.has(c.k);html+='<div class="preset"><button onclick="obKey(\''+c.k+'\')" style="font-size:18px;padding:4px">'+(sel?'⭐':'☆')+'</button><div class="qi" style="flex:1;margin-left:6px"><div class="t" style="font-size:13.5px">'+esc(c.p.title)+'</div></div></div>';});
  html+='<button class="btn" style="margin-top:16px" onclick="obKeyNext()">NEXT</button><button class="btn ghost sm" style="margin-top:8px" onclick="obBack()">Back</button>';return html;}
function obKey(k){if(OB.keystones.has(k))OB.keystones.delete(k);else{if(OB.keystones.size>=3){toast('Max 3 keystones');return;}OB.keystones.add(k);}renderOB();}
function obKeyNext(){OB.step++;renderOB();}
function obFinish(){return '<div class="center" style="font-size:30px">⟁</div><div class="sys-big" style="font-size:18px">You\'re ready</div>'+
  '<p class="center">Track your weight & a money budget too?</p>'+
  '<div class="chipsel" style="justify-content:center"><button class="'+(OB.wantWeight?'sel':'')+'" onclick="OB.wantWeight=!OB.wantWeight;renderOB()">⚖️ Weight</button><button class="'+(OB.wantMoney?'sel':'')+'" onclick="OB.wantMoney=!OB.wantMoney;renderOB()">💰 Money</button></div>'+
  '<p class="center tiny" style="margin-top:10px">You can toggle these anytime. The Ascent begins now.</p>'+
  '<button class="btn" style="margin-top:16px" onclick="finishOnboarding()">ENTER THE SYSTEM</button><button class="btn ghost sm" style="margin-top:8px" onclick="obBack()">Back</button>';}
function finishOnboarding(){
  S.profile.name=OB.name;S.profile.units=OB.units;S.profile.weightOn=OB.wantWeight;
  S.finance.enabled=OB.wantMoney;S.finance.currency=OB.currency;
  S.quests=[...OB.chosen].map(k=>{const[a,i]=k.split('|');const p=PRESETS[a][+i];return {id:uid(),title:p.title,stat:p.stat,xp:p.xp,gold:p.gold,days:[...p.days],key:OB.keystones.has(k)};});
  S.onboarded=true;S.profile.startDate=todayStr();save();$('#modal-host').innerHTML='';render();
  setTimeout(()=>startTour(),300);
}

/* ============================================================ MODALS / MISC */
function sysModal(head,html,btn,onClose,celebrate){btn=btn||'OK';$('#modal-host').innerHTML='<div class="overlay"><div class="sys'+(celebrate?' celebrate':'')+'"><div class="sys-h">SYSTEM · '+head+'</div>'+html+'<button class="btn" style="margin-top:16px" id="ovbtn">'+btn+'</button></div></div>';$('#ovbtn').onclick=()=>{$('#modal-host').innerHTML='';if(onClose)onClose();};}
function confetti(){try{const c=['#9db1ff','#cbb2ff','#ffce6b','#74f0bd','#ff8fa0','#79e6da'];for(let i=0;i<28;i++){const d=document.createElement('div');d.className='confp';d.style.left=(Math.random()*100)+'vw';d.style.background=c[i%c.length];d.style.animationDelay=(Math.random()*0.25)+'s';d.style.opacity=0.9;document.body.appendChild(d);setTimeout(()=>d.remove(),1800);}}catch(e){}}
/* ---------- sound FX (tiny web-audio synth, no assets) ---------- */
let _AC;
function tone(freq,dur,type,vol,delay){try{_AC=_AC||new (window.AudioContext||window.webkitAudioContext)();if(_AC.state==='suspended')_AC.resume();const t=_AC.currentTime+(delay||0);const o=_AC.createOscillator(),g=_AC.createGain();o.type=type||'sine';o.frequency.setValueAtTime(freq,t);o.connect(g);g.connect(_AC.destination);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol||0.05,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.15));o.start(t);o.stop(t+(dur||0.15)+0.02);}catch(e){}}
function sfx(name){if(!S.sound)return;
  if(name==='tick'){tone(680,0.07,'square',0.05);tone(920,0.08,'square',0.045,0.05);}
  else if(name==='coin'){tone(988,0.06,'square',0.05);tone(1319,0.11,'square',0.05,0.05);}
  else if(name==='undo'){tone(400,0.09,'sine',0.04);tone(300,0.1,'sine',0.035,0.06);}
  else if(name==='level'){[523,659,784,1047].forEach((f,i)=>tone(f,0.2,'triangle',0.06,i*0.09));}
  else if(name==='rank'){[440,554,659,880,1175].forEach((f,i)=>tone(f,0.24,'sawtooth',0.045,i*0.1));}
  else if(name==='combo'){const b=560+Math.min(8,COMBO)*70;tone(b,0.08,'square',0.05);tone(b*1.5,0.09,'square',0.045,0.05);}
  else if(name==='loot'){[659,880,1047,1319,1568].forEach((f,i)=>tone(f,0.16,'triangle',0.06,i*0.07));}
  else if(name==='achv'){[784,1047,1319].forEach((f,i)=>tone(f,0.22,'triangle',0.06,i*0.1));}
}
function floatText(x,y,txt,color){try{const el=document.createElement('div');el.className='floatxp';el.textContent=txt;el.style.left=x+'px';el.style.top=y+'px';el.style.color=color||'var(--accent)';document.body.appendChild(el);setTimeout(()=>el.remove(),1080);}catch(e){}}
function comboPop(n){try{const el=document.createElement('div');el.className='combo-pop';const words=['','','NICE','FIRE 🔥','ON ONE 🔥','UNREAL','GOATED','INSANE','UNSTOPPABLE','LEGENDARY 👑'];el.innerHTML='<span class="cx">'+n+'x COMBO</span><span class="cs">'+(words[Math.min(n,words.length-1)]||'LEGENDARY 👑')+'</span>';document.body.appendChild(el);setTimeout(()=>{el.style.transition='opacity .3s';el.style.opacity='0';},650);setTimeout(()=>el.remove(),1000);}catch(e){}}
/* ---------- daily loot ---------- */
function lootReady(){return S.lastLoot!==todayStr();}
function claimLoot(){if(!lootReady())return;const roll=Math.random(),g=roll<0.08?200:roll<0.3?100:40+Math.floor(Math.random()*61);S.gold+=g;S.lastLoot=todayStr();save();sfx('loot');confetti();if(navigator.vibrate)navigator.vibrate([15,40,15,40,60]);
  const flair=roll<0.08?'JACKPOT! 🎰':roll<0.3?'Big W 💎':'Daily bag secured 💰';
  sysModal('DAILY LOOT','<div class="sys-big" style="font-size:48px">🎁</div><div class="sys-big" style="font-size:20px">'+flair+'</div><p class="center">You bagged <span class="hl">+'+g+' gold</span>.<br>Come back tomorrow for more 👀</p>','CLAIM IT',null,true);render();}
function levelUpMsg(l){confetti();sysModal('NOTIFICATION','<div class="center" style="color:var(--gold);letter-spacing:4px;font-family:Space Grotesk;font-size:11px;font-weight:600">⟨ LEVEL UP ⟩</div><div class="sys-big">LEVEL '+l+'</div><p class="center">'+titleFor(l)+'<br>You leveled up — certified W 📈🔥</p>','LETS GO',null,true);if(navigator.vibrate)navigator.vibrate([30,60,30,60,80]);}
function rankUpMsg(rk){confetti();sysModal('RANK UP','<div class="center" style="color:var(--gold);letter-spacing:4px;font-family:Space Grotesk;font-size:11px;font-weight:600">⟨ RANK UP ⟩</div><div class="sys-big" style="font-size:46px">'+rk+'</div><p class="center">Ranked up to <b style="color:var(--accent)">Rank '+rk+'</b> 🔥<br>The System sees you. Different breed.</p>','CERTIFIED 👑',null,true);if(navigator.vibrate)navigator.vibrate([40,60,40,60,120]);}
/* ---------- weekly challenge ---------- */
function weekKey(){const d=new Date();const oneJan=new Date(d.getFullYear(),0,1);const wk=Math.ceil(((d-oneJan)/86400000+oneJan.getDay()+1)/7);return d.getFullYear()+'-W'+wk;}
function challenge(){const due=ALL.reduce((n,dy)=>n+S.quests.filter(q=>q.days.includes(dy)).length,0);const target=Math.max(12,Math.round(due*0.6));const done=weekStats().cleared;return{target,done,reward:120,claimed:!!S.challengeClaimed[weekKey()]};}
function checkChallenge(){const c=challenge();if(c.done>=c.target&&!c.claimed){S.challengeClaimed[weekKey()]=true;S.gold+=c.reward;S.totalXp+=c.reward;save();confetti();sfx('loot');sysModal('WEEKLY CHALLENGE COMPLETE','<div class="sys-big" style="font-size:38px">🎯</div><p class="center">Cleared <b>'+c.done+'</b> quests this week — you\'re him/her 😤<br><span class="hl">+'+c.reward+' XP · +'+c.reward+' Gold</span></p>','SECURED 🏆',null,true);render();}}
function toast(msg){const h=$('#notif-host');const el=document.createElement('div');el.className='notif';el.textContent='◆ '+msg;h.appendChild(el);setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .4s';},1200);setTimeout(()=>el.remove(),1650);}
function recapHTML(){const wk=weekStats(),sc=attrScores(),st=streakInfo();const ent=Object.entries(sc),best=ent.reduce((a,b)=>b[1]>a[1]?b:a),worst=ent.reduce((a,b)=>b[1]<a[1]?b:a);let wch='—';const ws=S.weights.slice(-8);if(ws.length>=2){const dd=+(ws[ws.length-1].kg-ws[0].kg).toFixed(1);wch=(dd>0?'+':'')+dd+' '+S.profile.units;}return '<div class="sys-big" style="font-size:20px">WEEK IN REVIEW</div><div class="hero-stats" style="margin-bottom:8px"><div class="chip done"><b class="num">'+wk.perfect+'</b><span>Streak Days</span></div><div class="chip"><b class="num">'+wk.cleared+'</b><span>Quests</span></div><div class="chip gold"><b class="num">'+wk.xp+'</b><span>XP</span></div></div><p>🔥 Streak: <b>'+st.cur+'</b> days'+(S.profile.weightOn?' · ⚖️ '+wch:'')+'</p><p>💪 Strongest: <b style="color:var(--green)">'+STATS[best[0]].name+' ('+best[1]+'%)</b><br>🎯 Focus next: <b style="color:var(--red)">'+STATS[worst[0]].name+' ('+worst[1]+'%)</b></p><p class="center tiny">Pick next week\'s focus and keep going, '+esc(S.profile.name)+'.</p>';}
function showRecap(){sysModal('WEEKLY RECAP',recapHTML(),"LET'S GO");}
/* ---------- app tour ---------- */
const TOUR=[
 {ic:'◇',title:'Welcome to The System',text:'Turn your goals into daily quests. Clear them → earn XP, level up (rank E→S), stack gold. 20-sec tour, then you\'re in 🚀'},
 {ic:'⚔️',title:'Daily Quests',text:'Tap a quest to clear it — instant XP + gold, and combos if you chain them fast 🔥 Hit “Manage Quests” to add, edit or delete anything. Fully yours.'},
 {ic:'🔥',title:'Keystones & Streak',text:'Tag 2–3 quests as ⭐ keystones. Only those hold your streak — clear them daily and the chain survives even on lazy days. Each quest also tracks its own 🔥 streak.'},
 {ic:'🎯',title:'Challenges & Badges',text:'A weekly challenge + 15 achievements drop bonus gold. Peep your badges and consistency web in Stats. Gotta collect em all 👀'},
 {ic:'🎁',title:'Loot & Rewards',text:'Grab a free Daily Loot drop on Home, then spend gold in the Shop on real-life rewards you set — treat, movie, whatever. Zero guilt.'},
 {ic:'$',title:'Money & Log',text:'Optional money tracker (budget, spending, savings) in Money. The Log tab = calendar, charts, weight glow-up & your notes.'},
 {ic:'⚙',title:'Make it yours',text:'Settings has themes, sound FX, weight/money toggles + backup. Replay this tour anytime. Now go lock in 🔒'},
];
let TI=0;
function startTour(){TI=0;renderTour();}
function renderTour(){const t=TOUR[TI],last=TI===TOUR.length-1;
  $('#modal-host').innerHTML='<div class="overlay"><div class="sys celebrate"><div class="sys-h">TOUR · '+(TI+1)+' / '+TOUR.length+'</div>'+
   '<div class="sys-big" style="font-size:42px">'+t.ic+'</div><div class="sys-big" style="font-size:18px">'+t.title+'</div><p class="center">'+t.text+'</p>'+
   '<button class="btn" style="margin-top:16px" id="tnext">'+(last?'START PLAYING':'NEXT')+'</button>'+
   '<button class="btn ghost sm" style="margin-top:8px" id="tback">'+(TI>0?'Back':'Skip tour')+'</button></div></div>';
  $('#tnext').onclick=()=>{if(TI<TOUR.length-1){TI++;renderTour();}else endTour();};
  $('#tback').onclick=()=>{if(TI>0){TI--;renderTour();}else endTour();};}
function endTour(){S.tourDone=true;save();$('#modal-host').innerHTML='';}
function openSettings(){const p=S.profile;const themeSel=Object.keys(THEMES).map(t=>'<button class="swatch '+(S.theme===t?'sel':'')+'" style="background:'+THEMES[t].a+'" onclick="setTheme(\''+t+'\')"></button>').join('');
  sysModal('SETTINGS','<label>Name</label><input id="s_name" value="'+esc(p.name)+'">'+
   '<div class="row2"><div><label>Weight unit</label><select id="s_units"><option value="kg"'+(p.units==='kg'?' selected':'')+'>kg</option><option value="lb"'+(p.units==='lb'?' selected':'')+'>lb</option></select></div><div><label>Goal weight</label><input id="s_goal" type="number" value="'+(p.goalWeight||'')+'"></div></div>'+
   '<label style="margin-top:12px"><input type="checkbox" id="s_won" '+(p.weightOn?'checked':'')+' style="width:auto;margin-right:8px">Track weight</label>'+
   '<label style="margin-top:8px"><input type="checkbox" id="s_mon" '+(S.finance.enabled?'checked':'')+' style="width:auto;margin-right:8px">Money tracker</label>'+
   '<label style="margin-top:8px"><input type="checkbox" id="s_snd" '+(S.sound?'checked':'')+' style="width:auto;margin-right:8px">🔊 Sound FX (taps, level-ups, loot)</label>'+
   '<label>Theme</label><div style="display:flex;gap:10px;margin-top:6px">'+themeSel+'</div>'+
   '<button class="btn" style="margin-top:16px" onclick="saveSettings()">SAVE</button>'+
   '<button class="btn ghost sm" style="margin-top:8px" onclick="manageQuests()">✏️ MANAGE QUESTS</button>'+
   '<button class="btn ghost sm" style="margin-top:8px" onclick="startTour()">🧭 TAKE THE TOUR</button>'+
   '<button class="btn ghost sm" style="margin-top:8px" onclick="forceUpdate()">⟳ CHECK FOR UPDATES</button>'+
   '<button class="btn ghost sm" style="margin-top:8px" onclick="exportData()">EXPORT BACKUP</button>'+
   '<button class="btn ghost sm" style="margin-top:8px" onclick="importData()">IMPORT BACKUP</button>'+
   '<button class="btn danger sm" style="margin-top:8px" onclick="hardReset()">RESET ALL DATA</button>'+
   '<p class="tiny center" style="margin-top:12px">Data stays on this device. Export before switching phones.<br>The System · v'+APP_VERSION+'</p>','CLOSE');}
function setTheme(t){S.theme=t;save();applyTheme();openSettings();}
function saveSettings(){S.profile.name=$('#s_name').value.trim()||'Hunter';S.profile.units=$('#s_units').value;S.profile.goalWeight=parseFloat($('#s_goal').value)||null;S.profile.weightOn=$('#s_won').checked;S.finance.enabled=$('#s_mon').checked;S.sound=$('#s_snd').checked;if(S.sound)sfx('coin');save();$('#modal-host').innerHTML='';render();toast('Saved ✓');}
function exportData(){const b=new Blob([JSON.stringify(S)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='thesystem-backup-'+todayStr()+'.json';a.click();}
function importData(){const i=document.createElement('input');i.type='file';i.accept='.json,application/json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const parsed=JSON.parse(r.result);if(!parsed||!parsed.profile){alert('That doesn\'t look like a System backup.');return;}S=normalize(parsed);save();$('#modal-host').innerHTML='';render();toast('Backup restored');}catch(x){alert('Invalid or corrupted file.');}};r.readAsText(f);};i.click();}
function hardReset(){if(confirm('Erase ALL data? This cannot be undone.')){localStorage.removeItem(STORE);S=defaultState();save();$('#modal-host').innerHTML='';render();}}
function forceUpdate(){toast('Checking…');if('serviceWorker' in navigator)navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.update()));setTimeout(()=>location.reload(),700);}

/* ============================================================ BOOT */
document.querySelectorAll('#nav button').forEach(b=>{b.onclick=()=>{TAB=b.dataset.t;render();window.scrollTo(0,0);};});
if(S.lastOpen!==todayStr()){S.lastOpen=todayStr();save();}
if(S.onboarded)checkAchievements(true);
applyTheme();render();
if(S.onboarded&&dow()===0&&S.lastRecap!==todayStr()&&Object.keys(S.history).length>0){S.lastRecap=todayStr();save();showRecap();}
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').then(reg=>{reg.update();setInterval(()=>reg.update(),60000);}).catch(()=>{});});let refreshing=false;navigator.serviceWorker.addEventListener('controllerchange',()=>{if(refreshing)return;refreshing=true;location.reload();});}
</script>
